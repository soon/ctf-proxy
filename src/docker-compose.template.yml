services:
  envoy:
    image: envoyproxy/envoy:v1.38.3
    network_mode: host
    user: "1337:1337"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/interceptor/wasm:/etc/envoy/wasm:ro
      - ./envoy/tls:/etc/envoy/tls:ro
      - ./logs:/var/log/envoy
    command: ["-c", "/etc/envoy/envoy.yaml"]
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=ctf
      - POSTGRES_PASSWORD=ctf
      - POSTGRES_DB=ctf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctf"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - control-panel

  logs-processor:
    build:
      context: ./backend
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./logs-archive:/app/logs-archive
    environment:
      - PYTHONUNBUFFERED=1
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=ctf
      - PGPASSWORD=ctf
      - PGDATABASE=ctf
    restart: unless-stopped
    depends_on:
      envoy:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - control-panel

  analyzer:
    build:
      context: ./backend
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    command: ["python", "-m", "ctf_proxy.analytics"]
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=ctf
      - PGPASSWORD=ctf
      - PGDATABASE=ctf
    restart: unless-stopped
    depends_on:
      logs-processor:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - control-panel

  analyzer-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=ctf
      - PGPASSWORD=ctf
      - PGDATABASE=ctf
    command: ["gunicorn", "ctf_proxy.analytics.api:app", "--workers", "2", "--worker-class", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8090", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    restart: unless-stopped
    depends_on:
      analyzer:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - control-panel

  dashboard-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    volumes:
      - ./data:/app/data
      - ./logs-archive:/app/logs-archive
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_PATH=/app/data/config.yml
      - ANALYZER_API_URL=http://analyzer-api:8090
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=ctf
      - PGPASSWORD=ctf
      - PGDATABASE=ctf
    command: ["gunicorn", "ctf_proxy.dashboard.app:app", "--workers", "4", "--worker-class", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8080", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    restart: unless-stopped
    depends_on:
      envoy:
        condition: service_started
      analyzer-api:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - control-panel

  code-server:
    image: lscr.io/linuxserver/openvscode-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    restart: unless-stopped
    networks:
      - control-panel

  dashboard-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - control-panel

  traefik:
    image: traefik:v3.2
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --experimental.localPlugins.auth.moduleName=github.com/ctfproxy/auth
    ports:
      - "127.0.0.1:48955:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik/dynamic:ro
      - ./traefik-plugins:/plugins-local:ro
    restart: unless-stopped
    depends_on:
      - dashboard-backend
      - dashboard-ui
      - code-server
    networks:
      - control-panel

networks:
  control-panel:

volumes:
  pgdata: {}