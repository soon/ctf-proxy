services:
  envoy:
    image: envoyproxy/envoy:v1.38.3
    network_mode: host
    user: "1337:1337"
    volumes:
      - ./ctf_proxy/proxy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./interceptor/wasm:/etc/envoy/wasm:ro
      - ./ctf_proxy/proxy/tls:/etc/envoy/tls:ro
      - ./logs:/var/log/envoy
    command: ["-c", "/etc/envoy/envoy.yaml"]
    restart: unless-stopped

  logs-processor:
    build:
      context: .
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./logs-archive:/app/logs-archive
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - envoy

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    command: ["python", "-m", "ctf_proxy.analyzer"]
    volumes:
      - ./data:/app/data
      - ./analyzer-rules:/app/rules:ro
    environment:
      - PYTHONUNBUFFERED=1
      - SOURCE_DB_FILE=/app/data/proxy_stats.db
      - ANALYSIS_DB_FILE=/app/data/analysis.db
      - RULES_FOLDER=/app/rules
    restart: unless-stopped
    depends_on:
      - logs-processor

  analyzer-api:
    build:
      context: .
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    volumes:
      - ./data:/app/data
      - ./analyzer-rules:/app/rules
    environment:
      - PYTHONUNBUFFERED=1
      - SOURCE_DB_FILE=/app/data/proxy_stats.db
      - ANALYSIS_DB_FILE=/app/data/analysis.db
      - RULES_FOLDER=/app/rules
    command: ["gunicorn", "ctf_proxy.analyzer.api:app", "--workers", "2", "--worker-class", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8090", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    restart: unless-stopped
    depends_on:
      - analyzer
    networks:
      - control-panel

  dashboard-backend:
    build:
      context: .
      dockerfile: Dockerfile.logs-processor
    user: "1337:1337"
    volumes:
      - ./data:/app/data
      - ./logs-archive:/app/logs-archive
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_PATH=/app/data/config.yml
      - DB_PATH=/app/data/proxy_stats.db
      - ANALYZER_API_URL=http://analyzer-api:8090
    command: ["gunicorn", "ctf_proxy.dashboard.app:app", "--workers", "4", "--worker-class", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8080", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    restart: unless-stopped
    depends_on:
      - envoy
      - analyzer-api
    networks:
      - control-panel

  code-server:
    image: lscr.io/linuxserver/openvscode-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    restart: unless-stopped
    networks:
      - control-panel

  dashboard-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - control-panel

  traefik:
    image: traefik:v3.2
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --experimental.localPlugins.auth.moduleName=github.com/ctfproxy/auth
    ports:
      - "127.0.0.1:48955:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik/dynamic:ro
      - ./traefik-plugins:/plugins-local:ro
    restart: unless-stopped
    depends_on:
      - dashboard-backend
      - dashboard-ui
      - code-server
    networks:
      - control-panel

networks:
  control-panel: